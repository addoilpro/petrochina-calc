<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中國石油 PetroChina 精確成本計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .petro-gradient { background: linear-gradient(135deg, #e21d1d 0%, #b91c1c 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 50; transition: opacity 0.3s; }
        .day-btn.active { border-color: #ef4444; background-color: #fef2f2; color: #b91c1c; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        .fuel-btn.active { border-color: #ef4444; background-color: #fff1f2; }
        input[type="checkbox"]:checked { background-color: #ef4444; border-color: #ef4444; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Loading Screen -->
    <div id="loading" class="loading-overlay">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-red-600 mx-auto mb-4"></div>
            <p class="text-sm font-bold text-gray-600">正在同步雲端數據...</p>
        </div>
    </div>

    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] overflow-hidden card-shadow border border-gray-100">
        <!-- Header -->
        <div class="petro-gradient p-6 text-white text-center">
            <h1 class="text-xl font-black flex justify-center items-center gap-2">
                <span class="bg-white text-red-600 rounded-lg w-8 h-8 flex items-center justify-center shadow-sm text-sm">中</span>
                石油精算機
            </h1>
            <p id="sync-status" class="opacity-90 text-[10px] mt-1 font-mono">連線中...</p>
        </div>

        <div class="p-5 space-y-4">
            <!-- 1. 日期選擇 -->
            <div>
                <label class="block text-gray-800 font-bold mb-2 text-xs">選擇今日星期</label>
                <div class="grid grid-cols-7 gap-1" id="day-picker">
                    <button onclick="updateSelection('day', 1)" class="day-btn py-2 rounded-lg border text-xs font-bold bg-white text-gray-500" data-day="1">一</button>
                    <button onclick="updateSelection('day', 2)" class="day-btn py-2 rounded-lg border text-xs font-bold bg-white text-gray-500" data-day="2">二</button>
                    <button onclick="updateSelection('day', 3)" class="day-btn py-2 rounded-lg border text-xs font-bold bg-white text-gray-500" data-day="3">三</button>
                    <button onclick="updateSelection('day', 4)" class="day-btn py-2 rounded-lg border text-xs font-bold bg-white text-gray-500" data-day="4">四</button>
                    <button onclick="updateSelection('day', 5)" class="day-btn py-2 rounded-lg border text-xs font-bold bg-white text-gray-500" data-day="5">五</button>
                    <button onclick="updateSelection('day', 6)" class="day-btn py-2 rounded-lg border text-xs font-bold bg-white text-gray-500" data-day="6">六</button>
                    <button onclick="updateSelection('day', 7)" class="day-btn py-2 rounded-lg border text-xs font-bold bg-white text-gray-500" data-day="7">日</button>
                </div>
            </div>

            <!-- 2. 油站地點 -->
            <div>
                <label class="block text-gray-800 font-bold mb-2 text-xs">油站地點</label>
                <select id="station-select" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none text-sm font-semibold text-gray-700 shadow-sm" onchange="calculate()">
                </select>
            </div>

            <!-- 3. 選擇油品 -->
            <div class="bg-gray-50 p-3 rounded-2xl border border-gray-100">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="updateSelection('fuel', 'Futuro')" id="btn-super" class="fuel-btn border-2 rounded-xl p-2 text-center relative overflow-hidden transition-all">
                        <div class="font-bold text-sm" id="label-super">超級 Futuro</div>
                        <div class="text-[10px] text-gray-500" id="price-super">$32.89</div>
                        <div id="tag-upgrade" class="hidden absolute top-0 right-0 bg-yellow-400 text-red-800 text-[8px] px-1.5 py-0.5 font-bold shadow-sm">免費升級</div>
                    </button>
                    <button onclick="updateSelection('fuel', 'VitaGold')" id="btn-regular" class="fuel-btn border-2 rounded-xl p-2 text-center transition-all">
                        <div class="font-bold text-sm" id="label-regular">清新 VitaGold</div>
                        <div class="text-[10px] text-gray-500" id="price-regular">$31.09</div>
                    </button>
                </div>
            </div>

            <!-- 4. 付款金額與額外優惠 -->
            <div class="grid grid-cols-1 gap-3">
                <div>
                    <label class="block text-gray-800 font-bold mb-2 text-xs">實際付款金額 (HKD)</label>
                    <input type="number" id="pay-amount" value="500" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-red-500 text-lg font-black text-red-600 shadow-inner" oninput="calculate()">
                </div>
                <div class="flex gap-4 px-1">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="check-blackcard" class="w-4 h-4 rounded text-red-600 border-gray-300 focus:ring-red-500" onchange="calculate()">
                        <span class="text-[11px] font-bold text-gray-700">中石油黑卡 ($11)</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="check-coupon" class="w-4 h-4 rounded text-red-600 border-gray-300 focus:ring-red-500" onchange="calculate()">
                        <span class="text-[11px] font-bold text-gray-700">500送60油卷</span>
                    </label>
                </div>
            </div>

            <!-- Result Card -->
            <div class="bg-gray-900 rounded-[2rem] p-6 text-white shadow-2xl relative overflow-hidden">
                <div class="absolute -right-4 -top-4 opacity-5 font-black text-8xl italic">PETRO</div>
                <div class="flex justify-between items-center border-b border-gray-800 pb-4 mb-4">
                    <div class="flex flex-col">
                        <span class="text-gray-400 text-xs font-bold">油錶跳動目標:</span>
                        <span id="meter-logic-hint" class="text-[9px] text-gray-500"></span>
                    </div>
                    <span class="text-3xl font-black text-yellow-400 font-mono" id="res-meter">$0.00</span>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-white/5 p-3 rounded-xl border border-white/10 text-center">
                        <div class="text-gray-500 text-[10px] mb-1">直減淨價/L</div>
                        <div class="text-lg font-bold text-white font-mono" id="res-direct">$0.00</div>
                    </div>
                    <div class="bg-white/5 p-3 rounded-xl border border-white/10 text-center">
                        <div class="text-gray-500 text-[10px] mb-1">連積分/卷淨價/L</div>
                        <div class="text-lg font-bold text-green-400 font-mono" id="res-points">$0.00</div>
                    </div>
                </div>

                <div class="space-y-2 border-t border-gray-800 pt-4">
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-gray-400">總入油量 (L):</span>
                        <span class="font-bold text-blue-400 font-mono text-base" id="res-liters">0.000 L</span>
                    </div>
                    <div class="flex justify-between items-center text-[10px] text-gray-500 pl-2">
                        <span>└ 實付金額購得:</span>
                        <span id="liters-paid" class="font-mono">0.000 L</span>
                    </div>
                    <div id="row-coupon-extra" class="flex justify-between items-center text-[10px] text-yellow-500 pl-2 hidden">
                        <span>└ 油卷贈送升數:</span>
                        <span id="liters-coupon" class="font-mono">+0.000 L</span>
                    </div>
                    <div class="flex justify-between items-center text-sm border-t border-gray-800/50 pt-2">
                        <span class="text-gray-400">估算積分升數 (L):</span>
                        <span class="font-bold text-orange-400 font-mono" id="res-extra">0.000 L</span>
                    </div>
                    <div class="flex justify-between items-center text-[11px] pt-1">
                        <span class="text-gray-500" id="res-promo-short">---</span>
                        <span class="text-orange-500 font-bold" id="res-pts">0 pts</span>
                    </div>
                </div>
            </div>

            <!-- Full Details -->
            <div class="text-[10px] bg-blue-50 text-blue-700 p-3 rounded-xl border border-blue-100 leading-relaxed" id="res-promo-long">
                正在讀取數據...
            </div>
        </div>
        
        <div class="bg-gray-50 p-4 text-[9px] text-gray-400 leading-relaxed border-t border-gray-100 flex justify-between">
            <span>* 積分換油基準：12,000分 = $200 (清新汽油)</span>
            <span id="update-time">未同步</span>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTWqLgHf9e8GyoDwCDxY15GY19TvKS0mIo4MXlaYb6pdvJrGm3wxgYsiORXX3vkgWuWjUasZ17X_Cqa/pub?gid=189785955&single=true&output=csv"; 
        
        let promoRules = []; 
        let gasPrices = { "Futuro": 32.89, "VitaGold": 31.09 }; 
        let state = { 
            day: new Date().getDay() || 7, 
            fuel: 'Futuro' 
        };

        async function init() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error("Sheet Error");
                const csvText = await response.text();
                processData(csvText);
                document.getElementById('sync-status').innerText = "數據已同步";
                document.getElementById('update-time').innerText = "最後更新: " + new Date().toLocaleTimeString();
            } catch (err) {
                document.getElementById('sync-status').innerText = "連線失敗";
            } finally {
                document.getElementById('loading').style.display = 'none';
                populateStations();
                updateSelection('day', state.day); 
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = "";
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = "";
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function processData(csv) {
            const lines = csv.split(/\r?\n/);
            const data = [];
            lines.forEach((line, index) => {
                if (index === 0 || !line.trim()) return; 
                const row = parseCSVLine(line);
                
                if (row[1] && row[2]) {
                    const fuelName = row[1].toLowerCase();
                    const price = parseFloat(row[2]);
                    if (price > 0) {
                        if (fuelName.includes('futuro')) gasPrices['Futuro'] = price;
                        if (fuelName.includes('vitagold')) gasPrices['VitaGold'] = price;
                    }
                }

                if (row[4] && row[5]) {
                    data.push({
                        stationRaw: row[4].replace(/"/g, '').trim(), 
                        days: row[5].replace(/"/g, '').trim(),
                        fuel: (row[6] || "").toLowerCase().trim(), 
                        discount: parseFloat(row[7]) || 0,
                        pts: parseInt(row[9]) || 1,
                        upgrade: (row[10] === '1' || row[10] === 1) ? 1 : 0
                    });
                }
            });
            if (data.length > 0) promoRules = data;
            updatePricesUI();
        }

        function updatePricesUI() {
            document.getElementById('price-super').innerText = `$${gasPrices['Futuro'].toFixed(2)}`;
            document.getElementById('price-regular').innerText = `$${gasPrices['VitaGold'].toFixed(2)}`;
        }

        function populateStations() {
            const select = document.getElementById('station-select');
            const allStations = [];
            promoRules.forEach(rule => {
                if (rule.stationRaw === "Station" || !rule.stationRaw) return;
                const parts = rule.stationRaw.split(/[，,]/).map(s => s.trim());
                parts.forEach(p => { if(p && !allStations.includes(p)) allStations.push(p); });
            });
            allStations.sort();
            select.innerHTML = allStations.map(s => `<option value="${s}">${s}</option>`).join('');
            calculate();
        }

        function updateSelection(type, val) {
            state[type] = val;
            if (type === 'day') {
                document.querySelectorAll('.day-btn').forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.day) === val));
            }
            if (type === 'fuel') {
                document.getElementById('btn-super').classList.toggle('active', val === 'Futuro');
                document.getElementById('btn-regular').classList.toggle('active', val === 'VitaGold');
            }
            calculate();
        }

        function calculate() {
            const pay = parseFloat(document.getElementById('pay-amount').value) || 0;
            const selectedStation = document.getElementById('station-select').value;
            const useBlackCard = document.getElementById('check-blackcard').checked;
            const useCoupon = document.getElementById('check-coupon').checked;

            if (!selectedStation) return;
            
            const matchedRules = promoRules.filter(r => {
                const stationArray = r.stationRaw.split(/[，,]/).map(s => s.trim());
                const dayArray = r.days.toString().split(/[，,]/).map(n => n.trim());
                return stationArray.includes(selectedStation) && dayArray.includes(state.day.toString());
            });

            const hasUpgradeEnabled = matchedRules.some(r => r.upgrade === 1);
            document.getElementById('tag-upgrade').classList.toggle('hidden', !hasUpgradeEnabled);

            const superPrice = gasPrices['Futuro'];
            const regularPrice = gasPrices['VitaGold'];
            const currentCardPrice = gasPrices[state.fuel];

            const targetKey = state.fuel === 'Futuro' ? 'super' : 'regular';
            let rule = matchedRules.find(r => r.fuel.includes(targetKey)) || matchedRules[0];
            if (!rule) return;

            let effectiveDiscount = rule.discount;
            if (useBlackCard && state.fuel === 'Futuro') {
                effectiveDiscount = Math.max(11.0, rule.discount);
            }

            let meterTarget = 0, currentLiters = 0, hint = "";

            if (hasUpgradeEnabled && state.fuel === 'Futuro') {
                const payPerLiter = regularPrice - effectiveDiscount;
                currentLiters = pay / payPerLiter;
                meterTarget = currentLiters * superPrice;
                hint = `(免費升級：平油牌價 $${regularPrice} - 折扣 $${effectiveDiscount})`;
            } else {
                const payPerLiter = currentCardPrice - effectiveDiscount;
                currentLiters = pay / payPerLiter;
                meterTarget = currentLiters * currentCardPrice;
                hint = `(支付單價 $${payPerLiter.toFixed(2)})`;
            }

            let couponLiters = 0;
            if (useCoupon && pay >= 500) {
                const bonusValue = Math.floor(pay / 500) * 60;
                const divisor = (hasUpgradeEnabled && state.fuel === 'Futuro') ? regularPrice : currentCardPrice;
                couponLiters = bonusValue / divisor;
                document.getElementById('row-coupon-extra').classList.remove('hidden');
                document.getElementById('liters-coupon').innerText = `+${couponLiters.toFixed(3)} L`;
            } else {
                document.getElementById('row-coupon-extra').classList.add('hidden');
            }

            const totalLiters = currentLiters + couponLiters;
            const points = Math.floor(pay * rule.pts);
            const extraLitersFromPoints = (points / 12000) * (200 / regularPrice);

            document.getElementById('res-meter').innerText = `$${meterTarget.toFixed(2)}`;
            document.getElementById('res-direct').innerText = `$${(pay / totalLiters).toFixed(3)}`;
            document.getElementById('res-points').innerText = `$${(pay / (totalLiters + extraLitersFromPoints)).toFixed(3)}`;
            document.getElementById('res-liters').innerText = `${totalLiters.toFixed(3)} L`;
            document.getElementById('liters-paid').innerText = `${currentLiters.toFixed(3)} L`;
            document.getElementById('res-extra').innerText = `${extraLitersFromPoints.toFixed(3)} L`;
            document.getElementById('res-pts').innerText = `${points.toLocaleString()} pts`;
            document.getElementById('res-promo-short').innerText = `${selectedStation} (星期${"一二三四五六日"[state.day-1]})`;
            document.getElementById('meter-logic-hint').innerText = hint;
            document.getElementById('res-promo-long').innerText = `已應用：${selectedStation} | 折扣 $${effectiveDiscount} | ${rule.pts}倍積分 ${hasUpgradeEnabled ? '| 免費升級' : ''}`;
        }

        window.onload = init;
    </script>
</body>
</html>
